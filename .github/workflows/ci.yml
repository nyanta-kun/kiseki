name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "0.6.10"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src/ --ignore-missing-imports || true

      - name: Tests (pytest)
        run: uv run pytest tests/ -v --tb=short
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          API_KEY: "test-key"
          API_ENV: "test"

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Type check (tsc)
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          AUTH_SECRET: "ci-test-secret-32-chars-long-ok"
          AUTH_PASSWORD: "test"
          AUTH_URL: "http://localhost:3000/api/auth"

  deploy:
    name: Deploy to galloplab.com
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment: production
    # main ブランチへの push 時のみデプロイ（PR では実行しない）
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=accept-new \
              "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
              'bash -lc "
                set -euo pipefail
                cd ~/GitHub/kiseki
                git pull origin main
                echo \"[deploy] DBマイグレーション実行...\"
                docker compose -f docker-compose.galloplab.yml build
                docker compose -f docker-compose.galloplab.yml run --rm --no-deps \
                  -e PYTHONPATH=/app backend uv run alembic upgrade head
                docker compose -f docker-compose.galloplab.yml up -d
                sleep 8
                docker ps | grep galloplab
                echo \"[deploy] 完了: https://galloplab.com/\"
              "'
