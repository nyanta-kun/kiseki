name: CI

# workflowレベルのデフォルト権限を最小化（INF-009）
permissions:
  contents: read
  actions: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4.2.0
        with:
          version: "0.6.10"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src/ --ignore-missing-imports

      - name: Tests (pytest)
        run: uv run pytest tests/ -v --tb=short --cov=src --cov-report=xml
        env:
          DATABASE_URL: "postgresql://test:test@localhost:5432/test"
          API_KEY: "test-key"
          API_ENV: "test"

  frontend:
    name: Frontend (Node.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Type check (tsc)
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
          AUTH_SECRET: "ci-test-secret-32-chars-long-ok"
          AUTH_PASSWORD: "test"
          AUTH_URL: "http://localhost:3000/api/auth"

  build-and-push:
    name: Build & Push Docker Images
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:main
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:main
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.galloplab.com
            NEXT_PUBLIC_WS_URL=wss://api.galloplab.com
            NEXT_PUBLIC_PAID_MODE=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to galloplab.com
    needs: [build-and-push]
    runs-on: ubuntu-latest
    # GitHub Environments の required_reviewers で承認ゲートを設定可能（INF-014）
    # Settings > Environments > production > Required reviewers に承認者を追加することを推奨
    environment: production
    # deployジョブに必要な権限を明示（INF-009）
    permissions:
      contents: read
    # main ブランチへの push 時のみデプロイ（PR では実行しない）
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # セキュリティ強化: DEPLOY_SSH_KNOWN_HOSTS シークレットにホストの公開鍵フィンガープリントを
          # 格納することを推奨。設定方法: ssh-keyscan <host> をローカルで実行し出力を
          # GitHub Secrets の DEPLOY_SSH_KNOWN_HOSTS に登録する。
          # 登録済みの場合は以下をコメントアウトして known_hosts シークレットを使用:
          #   printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.DEPLOY_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=30 \
              -o ServerAliveCountMax=20 \
              "${{ secrets.DEPLOY_SSH_USER }}@${{ secrets.DEPLOY_SSH_HOST }}" \
              'bash -s' << EOF
          set -euo pipefail
          cd ~/GitHub/kiseki
          git pull origin main
          echo "[deploy] イメージビルド（VPS上でビルド）..."
          docker compose -f docker-compose.galloplab.yml build
          echo "[deploy] コンテナ再作成..."
          docker compose -f docker-compose.galloplab.yml up -d --force-recreate
          echo "[deploy] ヘルスチェック待機中（backend が healthy になるまで最大180秒）..."
          for i in \$(seq 1 36); do
            sleep 5
            STATUS=\$(docker inspect --format='{{.State.Health.Status}}' galloplab-backend-1 2>/dev/null || echo "unknown")
            echo "  backend health: \$STATUS (\${i}/36)"
            if [ "\$STATUS" = "healthy" ]; then break; fi
          done
          echo "[deploy] DBマイグレーション実行..."
          docker exec -e PYTHONPATH=/app galloplab-backend-1 uv run alembic upgrade head
          docker compose -f docker-compose.galloplab.yml ps
          echo "[deploy] 完了: https://galloplab.com/"
          EOF
