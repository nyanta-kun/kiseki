# galloplab.com 本番デプロイ用 Compose
# 使用方法: docker compose -f docker-compose.galloplab.yml up -d --build
#
# nginx: galloplab.com/      → 127.0.0.1:3002  (Next.js)
# nginx: api.galloplab.com/  → 127.0.0.1:8003  (FastAPI)

name: kiseki-galloplab

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: galloplab-backend-1
    ports:
      - "127.0.0.1:8003:8000"
    env_file:
      - .env
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./logs:/app/logs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kiseki-galloplab
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* はビルド時に埋め込まれるため build.args で渡す
        NEXT_PUBLIC_API_URL: https://api.galloplab.com
        NEXT_PUBLIC_WS_URL: wss://api.galloplab.com
    container_name: galloplab-frontend-1
    ports:
      - "127.0.0.1:3002:3000"
    environment:
      # SSR時にDockerネットワーク内でバックエンドを呼び出す（ブラウザには公開しない）
      - BACKEND_URL=http://backend:8000/api
      # 認証（Auth.js）- galloplab.com向け設定
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      # AUTH_URLはgalloplab.com向けに上書き（.envのsekito-stable.com設定を無視）
      # コールバックURL: https://galloplab.com/api/auth/callback/google
      # Next.jsのルートが /api/auth/[...nextauth] のため /api/auth まで含める
      - AUTH_URL=https://galloplab.com/api/auth
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kiseki-galloplab
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 60s

networks:
  kiseki-galloplab:
    driver: bridge
