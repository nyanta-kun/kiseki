# sekito-stable.com 本番デプロイ用 Compose
# 使用方法: docker compose -f docker-compose.sekito.yml up -d --build
#
# nginx: /kiseki/      → 127.0.0.1:3001  (Next.js)
# nginx: /kiseki/api/  → 127.0.0.1:8002  (FastAPI)

name: kiseki

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiseki-backend-1
    ports:
      - "127.0.0.1:8002:8000"
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=https://sekito-stable.com
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./logs:/app/logs
    tmpfs:
      - /tmp
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kiseki
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_* はビルド時に埋め込まれるため build.args で渡す
        NEXT_PUBLIC_API_URL: https://sekito-stable.com/kiseki
    container_name: kiseki-frontend-1
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      # SSR時にDockerネットワーク内でバックエンドを呼び出す（ブラウザには公開しない）
      - BACKEND_URL=http://backend:8000/api
      # ブラウザからアクセス可能なURL（外部公開URL経由でnginxがバックエンドに転送）
      - NEXT_PUBLIC_API_URL=https://sekito-stable.com
      # 認証（Auth.js）- .env ファイルから注入
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
    tmpfs:
      - /tmp
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - kiseki
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/kiseki', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 60s

networks:
  kiseki:
    driver: bridge
