# galloplab.com Blue-Green デプロイ用 候補スロット（Bスロット）
#
# 役割: 新ビルドを本番と並行して起動し、ヘルスチェックで検証する
#       検証OK後に本番（galloplab.yml）へ切り替える
#
# イメージ: CI でビルド済みの ghcr.io イメージを使用（ローカルビルド不要）
#
# ポート:
#   backend:  127.0.0.1:8004:8000  （本番: 8003）
#   frontend: 127.0.0.1:3003:3000  （本番: 3002）
#
# ※ このファイルは直接 docker compose up しない。scripts/deploy-bluegreen.sh 経由で使用。

name: kiseki-galloplab-b

services:
  backend-b:
    image: ghcr.io/nyanta-kun/kiseki/backend:main
    container_name: galloplab-backend-b
    ports:
      - "127.0.0.1:8004:8000"
    env_file:
      - .env
    environment:
      - ALLOWED_ORIGINS=https://galloplab.com
    command: ["uv", "run", "uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes:
      - ./logs:/app/logs
    tmpfs:
      - /tmp
      - /home/appuser/.cache/uv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - kiseki-galloplab-b
    restart: "no"
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 15s
      timeout: 8s
      retries: 6
      start_period: 30s

  frontend-b:
    image: ghcr.io/nyanta-kun/kiseki/frontend:main
    container_name: galloplab-frontend-b
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      # SSR 時は候補バックエンドに接続
      - BACKEND_URL=http://backend-b:8000/api
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=https://galloplab.com/api/auth
      - INTERNAL_API_KEY=${CHANGE_NOTIFY_API_KEY}
    tmpfs:
      - /tmp
      - /home/appuser/.cache/uv
    depends_on:
      backend-b:
        condition: service_healthy
    networks:
      - kiseki-galloplab-b
    restart: "no"
    read_only: true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'
        reservations:
          memory: 128m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 60s

networks:
  kiseki-galloplab-b:
    driver: bridge
