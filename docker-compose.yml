# ローカル開発用 Compose
# - backend: src/ をvolumeマウント → コード変更即時反映（--reload付き）
# - frontend: pnpm dev で起動 → ホットリロード対応、ビルド不要
#
# 起動: docker compose up -d
# アクセス: http://localhost:3000/kiseki/

name: kiseki

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiseki-backend-1
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/src:/app/src
      - ./logs:/app/logs
    networks:
      - kiseki
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 5
      start_period: 30s

  frontend:
    image: node:22-alpine
    container_name: kiseki-frontend-1
    working_dir: /app
    # pnpm dev でホットリロード起動（productionビルド不要）
    command: sh -c "corepack enable && pnpm install --frozen-lockfile && pnpm dev"
    ports:
      - "3000:3000"
    environment:
      # SSR時にDockerネットワーク内でバックエンドを呼び出す（ブラウザには公開しない）
      - BACKEND_URL=http://backend:8000/api
      # ブラウザからアクセス可能なURL（ホストのlocalhost:8000へポートマッピング済み）
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api
      # 認証（Auth.js）- .env ファイルから注入
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - AUTH_GOOGLE_ID=${AUTH_GOOGLE_ID}
      - AUTH_GOOGLE_SECRET=${AUTH_GOOGLE_SECRET}
      - AUTH_URL=${AUTH_URL}
      - AUTH_TRUST_HOST=true
      # バックエンドAPI認証（サーバーサイドからの内部呼び出し用）
      - INTERNAL_API_KEY=${CHANGE_NOTIFY_API_KEY}
    volumes:
      - ./frontend:/app
      # node_modules はコンテナ内に保持（ホストのものと混在させない）
      - kiseki_frontend_modules:/app/node_modules
    depends_on:
      - backend
    networks:
      - kiseki
    restart: unless-stopped

networks:
  kiseki:
    driver: bridge

volumes:
  kiseki_frontend_modules:
